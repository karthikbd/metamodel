version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: meta_model_backend
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: ${NEO4J_URI:-neo4j+s://539a5ecc.databases.neo4j.io}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-539a5ecc}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-539a5ecc}
      NEO4J_LOCAL_URI: bolt://neo4j-local:7687
      NEO4J_LOCAL_USER: ${NEO4J_LOCAL_USER:-neo4j}
      NEO4J_LOCAL_PASSWORD: ${NEO4J_LOCAL_PASSWORD:-metaengine123}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REPO_SCAN_ROOT: /app/sample_repo
    volumes:
      - .:/app
    depends_on:
      neo4j-local:
        condition: service_healthy
    command: uvicorn main:app --app-dir backend --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "sh", "-c", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_BASE: ""
    container_name: meta_model_frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  neo4j-local:
    image: neo4j:5
    container_name: meta_model_neo4j_local
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/metaengine123
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  neo4j_data:
  neo4j_logs:
